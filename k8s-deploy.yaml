---
# Deployment: chat server using host code via hostPath
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-chat
  namespace: environment-69c753ea76bc68ba374ccf1d
  labels:
    app: openclaw-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-chat
  template:
    metadata:
      labels:
        app: openclaw-chat
    spec:
      nodeName: 178.104.108.212
      containers:
      - name: chat
        image: node:18-alpine
        command: ["node", "/app/server.js"]
        env:
        - name: PORT
          value: "7788"
        ports:
        - containerPort: 7788
          name: http
        volumeMounts:
        - name: app-code
          mountPath: /app
        readinessProbe:
          httpGet:
            path: /api/status
            port: 7788
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /api/status
            port: 7788
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
      volumes:
      - name: app-code
        hostPath:
          path: /root/openclaw-chat
          type: Directory

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: openclaw-chat-svc
  namespace: environment-69c753ea76bc68ba374ccf1d
  labels:
    app: openclaw-chat
spec:
  selector:
    app: openclaw-chat
  ports:
  - name: http
    port: 7788
    targetPort: 7788
  type: ClusterIP

---
# Ingress – expose at weieegame.zeabur.app/chat
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-chat-ingress
  namespace: environment-69c753ea76bc68ba374ccf1d
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  rules:
  - host: weieegame.zeabur.app
    http:
      paths:
      - path: /chat(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: openclaw-chat-svc
            port:
              number: 7788
